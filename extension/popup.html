<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    #url {
      font-size: 11px; color: #777;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 12px;
    }
    #status {
      font-size: 12px; color: #555;
      min-height: 18px; margin-bottom: 10px;
    }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
      padding: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f9f9f9;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    button:hover { background: #eee; }
    button:disabled { opacity: .5; cursor: default; }
    #settings { margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
    #settings label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    #api-url-input {
      width: 100%; font-size: 11px; padding: 4px 6px;
      border: 1px solid #ddd; border-radius: 4px;
    }
    #save-btn {
      margin-top: 6px; width: 100%; font-size: 11px;
      padding: 4px; background: #f0f0f0;
    }
    #link-section {
      margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px;
    }
    #link-section label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>📖 Reader Bot</h1>
  <div id="url"></div>
  <div id="status">Оберіть формат для збереження:</div>
  <div class="buttons">
    <button data-fmt="pdf">📄 PDF</button>
    <button data-fmt="md">📝 Markdown</button>
    <button data-fmt="html">🌐 HTML</button>
    <button data-fmt="epub">📚 EPUB</button>
  </div>
  <div id="settings">
    <label>API URL</label>
    <input id="api-url-input" type="text" placeholder="https://your-domain.com">
    <button id="save-btn">Зберегти</button>
  </div>
  <div id="link-section">
    <label>Прив'язати до Telegram або іншого браузера</label>
    <div style="display:flex;gap:6px;margin-top:4px">
      <input id="link-code-input" type="text" placeholder="Код (6 символів)"
        style="flex:1;font-size:11px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-transform:uppercase">
      <button id="link-confirm-btn" style="font-size:11px;padding:4px 8px">Прив'язати</button>
    </div>
    <button id="link-generate-btn" style="margin-top:6px;width:100%;font-size:11px;padding:4px;background:#f0f0f0">
      Згенерувати код для іншого браузера
    </button>
    <div id="link-status" style="font-size:11px;color:#555;margin-top:4px;min-height:16px"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
